name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read

jobs:
  build:
    name: Build, Audit, Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Production audit (fail on high+)
        run: npm audit --omit=dev --audit-level=high

      - name: Full audit (warn only, log report)
        if: always()
        run: |
          npm audit || true
          npm audit --json > npm-audit.json || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit.json
          retention-days: 14
          if-no-files-found: ignore

      - name: Build (production)
        run: npx ng build --configuration production

      - name: Test
        run: |
          if [ -d "node_modules/karma-chrome-launcher" ] && compgen -G "src/**/*.spec.ts" > /dev/null; then
            npx ng test --watch=false --browsers=ChromeHeadlessCI
          else
            echo "No specs or karma-chrome-launcher missing; skipping tests."
          fi
